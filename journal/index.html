<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journal | Sean Heffernan</title>
    <meta
      name="description"
      content="Weekly journal updates from Sean Heffernan"
    />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <header id="site-header"></header>

    <main>
      <section class="journal-hero">
        <div class="container">
          <p class="eyebrow">Weekly Journal</p>
          <h1>Notes, progress, and lessons from each week.</h1>
          <p class="lead">
            New entries are posted weekly. Keep updates short and consistent.
          </p>
          <p class="journal-note">
            To add a new entry, add a markdown file and register it in <code>/manifest.json</code>.
          </p>
        </div>
      </section>

      <section class="journal-list-section">
        <div class="container">
          <h2>Recent Entries</h2>
          <div class="journal-list" id="journal-list"></div>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="/assets/js/site-shell.js"></script>
    <script src="/assets/js/journal.js"></script>
    <script>
      renderSiteShell({ isHome: false });
      renderJournalList();
    </script>
  </body>
</html>
